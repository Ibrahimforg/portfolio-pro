<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  
  <!-- Person silhouette -->
  <circle cx="200" cy="150" r="60" fill="url(#face)"/>
  <path d="M 200 210 Q 130 230 120 320 L 280 320 Q 270 230 200 210" fill="url(#face)"/>
  
  <!-- Professional attire details -->
  <rect x="140" y="260" width="120" height="60" rx="5" fill="#1E293B" opacity="0.8"/>
  <circle cx="200" cy="290" r="8" fill="#F8FAFC"/>
  
  <!-- Initials -->
  <text x="200" y="160" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1E293B" text-anchor="middle">IF</text>
</svg>
