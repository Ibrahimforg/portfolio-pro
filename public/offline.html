<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne - Portfolio</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .offline-icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: pulse 2s infinite;
        }
        
        .offline-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .offline-description {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
            opacity: 0.9;
        }
        
        .offline-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .offline-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .offline-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        
        .offline-btn:active {
            transform: translateY(0);
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 24px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: #10b981;
            animation: none;
        }
        
        .cached-pages {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .cached-pages-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            opacity: 0.8;
        }
        
        .cached-pages-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
            text-align: left;
        }
        
        .cached-page {
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .cached-page:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        @media (max-width: 640px) {
            .offline-container {
                padding: 24px;
                margin: 10px;
            }
            
            .offline-actions {
                flex-direction: column;
            }
            
            .cached-pages-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📱</div>
        <h1 class="offline-title">Vous êtes hors ligne</h1>
        <p class="offline-description">
            Votre portfolio n'est pas accessible actuellement.<br>
            Ne vous inquiétez pas, vos données sont en sécurité et seront synchronisées dès que votre connexion sera rétablie.
        </p>
        
        <div class="connection-status">
            <div class="status-dot" id="status-dot"></div>
            <span id="connection-text">Vérification de la connexion...</span>
        </div>
        
        <div class="offline-actions">
            <button class="offline-btn" onclick="window.location.reload()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4v12M4 20h16M4 12l8-8 8 8"/>
                </svg>
                Réessayer
            </button>
            
            <button class="offline-btn" onclick="goHome()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11"/>
                    <path d="M5 21h14"/>
                </svg>
                Accueil
            </button>
        </div>
        
        <div class="cached-pages">
            <h3 class="cached-pages-title">Pages disponibles hors ligne</h3>
            <div class="cached-pages-list" id="cached-pages">
                <!-- Les pages seront ajoutées dynamiquement par JavaScript -->
            </div>
        </div>
    </div>
    
    <script>
        // Vérifier le statut de connexion
        function updateConnectionStatus() {
            const statusDot = document.getElementById('status-dot');
            const connectionText = document.getElementById('connection-text');
            const isOnline = navigator.onLine;
            
            if (isOnline) {
                statusDot.classList.add('online');
                statusDot.classList.remove('offline');
                connectionText.textContent = 'Connexion rétablie';
            } else {
                statusDot.classList.remove('online');
                statusDot.classList.add('offline');
                connectionText.textContent = 'Toujours hors ligne';
            }
        }
        
        // Aller à l'accueil
        function goHome() {
            window.location.href = '/';
        }
        
        // Charger les pages mises en cache
        async function loadCachedPages() {
            if ('caches' in window) {
                try {
                    const cache = await caches.open('dynamic-v1');
                    const keys = await cache.keys();
                    const cachedPages = document.getElementById('cached-pages');
                    
                    // Filtrer les pages principales
                    const pageKeys = keys.filter(key => 
                        key === '/' || 
                        key.includes('/about') || 
                        key.includes('/projects') || 
                        key.includes('/contact') || 
                        key.includes('/multimedia')
                    ).slice(0, 6);
                    
                    if (pageKeys.length > 0) {
                        cachedPages.innerHTML = pageKeys.map(key => {
                            const pageName = key === '/' ? 'Accueil' : 
                                              key.includes('/about') ? 'À propos' :
                                              key.includes('/projects') ? 'Projets' :
                                              key.includes('/contact') ? 'Contact' :
                                              key.includes('/multimedia') ? 'Multimédia' : key;
                            
                            return `
                                <div class="cached-page" onclick="window.location.href='${key}'">
                                    ${pageName}
                                </div>
                            `;
                        }).join('');
                    } else {
                        cachedPages.innerHTML = '<p style="opacity: 0.6; font-size: 12px;">Aucune page mise en cache</p>';
                    }
                } catch (error) {
                    console.log('Erreur lors du chargement du cache:', error);
                }
            }
        }
        
        // Écouter les changements de connexion
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        
        // Initialisation
        updateConnectionStatus();
        loadCachedPages();
        
        // Tentative de reconnexion automatique
        let retryCount = 0;
        setInterval(() => {
            if (!navigator.onLine) {
                retryCount++;
                if (retryCount % 10 === 0) {
                    updateConnectionStatus();
                }
            } else {
                retryCount = 0;
            }
        }, 5000);
        
        // Animation subtile de l'icône
        const icon = document.querySelector('.offline-icon');
        setInterval(() => {
            if (icon) {
                icon.style.transform = `scale(${1 + Math.sin(Date.now() / 1000) * 0.1})`;
            }
        }, 50);
    </script>
</body>
</html>
